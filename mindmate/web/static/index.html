<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小暖</title>
<style>
  :root {
    --wx-bg: #ededed;
    --wx-bar: #f7f7f7;
    --wx-green: #95ec69;
    --wx-green-press: #86dd5b;
    --wx-text: #181818;
    --wx-sub: #888;
    --wx-border: #d9d9d9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    background: var(--wx-bg);
    display: flex; flex-direction: column;
    color: var(--wx-text);
  }

  /* 顶栏 */
  header {
    background: var(--wx-bar);
    height: 56px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    border-bottom: 1px solid var(--wx-border);
  }
  header .title { font-size: 17px; font-weight: 500; }
  header .dot { color: #07c160; font-size: 11px; margin-left: 6px; vertical-align: middle; }
  header .back { position: absolute; left: 14px; color: #181818; font-size: 22px; text-decoration: none; line-height: 1; }
  header .more { position: absolute; right: 16px; color: #181818; font-size: 20px; cursor: pointer; }

  /* 聊天区 */
  #chat {
    flex: 1; overflow-y: auto; padding: 16px 12px 8px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .row { display: flex; align-items: flex-start; gap: 9px; }
  .row.user { flex-direction: row-reverse; }
  .avatar {
    width: 40px; height: 40px; border-radius: 5px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; background: #fff; box-shadow: 0 0 0 1px rgba(0,0,0,.04);
  }
  .avatar.me { background: #07c160; color: #fff; font-size: 16px; }
  .bubble-wrap { max-width: 66%; position: relative; }
  .bubble {
    position: relative; padding: 9px 13px; border-radius: 6px;
    font-size: 15px; line-height: 1.5; word-break: break-word;
    background: #fff;
  }
  .row.user .bubble { background: var(--wx-green); }
  /* 气泡小尖角 */
  .bubble::before {
    content: ""; position: absolute; top: 13px; width: 0; height: 0;
    border: 6px solid transparent;
  }
  .row.assistant .bubble::before {
    left: -11px; border-right-color: #fff;
  }
  .row.user .bubble::before {
    right: -11px; border-left-color: var(--wx-green);
  }
  /* 系统提示 / 时间分隔 */
  .sys { align-self: center; font-size: 12px; color: #fff; background: rgba(0,0,0,.15);
    padding: 3px 8px; border-radius: 4px; }
  .timestamp { align-self: center; font-size: 12px; color: #b2b2b2; margin: 2px 0; }

  /* 输入中动画气泡 */
  .typing-bubble { display: inline-flex; gap: 5px; padding: 13px 14px; align-items: center; }
  .typing-bubble span {
    width: 7px; height: 7px; background: #c2c2c2; border-radius: 50%;
    animation: bounce 1.3s infinite ease-in-out;
  }
  .typing-bubble span:nth-child(1) { animation-delay: -0.32s; }
  .typing-bubble span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity:.6 } 40% { transform: translateY(-5px); opacity:1 } }

  /* 输入区 */
  #input-bar {
    background: var(--wx-bar); flex-shrink: 0;
    padding: 8px 12px; display: flex; align-items: center; gap: 10px;
    border-top: 1px solid var(--wx-border);
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
  }
  #msg-input {
    flex: 1; border: none; outline: none; resize: none;
    background: #fff; border-radius: 6px; padding: 10px 12px;
    font-size: 15px; line-height: 1.4; max-height: 100px; min-height: 40px;
    font-family: inherit;
  }
  #send-btn {
    border: none; background: #07c160; color: #fff;
    padding: 0 16px; height: 36px; border-radius: 5px; font-size: 15px;
    cursor: pointer; flex-shrink: 0;
  }
  #send-btn:active { background: #06ad56; }
  #send-btn:disabled { background: #b5e5c5; cursor: default; }
</style>
</head>
<body>

<header>
  <a class="back" href="/dashboard" title="医生后台">‹</a>
  <span class="title">小暖<span class="dot">●</span></span>
  <span class="more">⋯</span>
</header>

<div id="chat"></div>

<div id="input-bar">
  <textarea id="msg-input" rows="1" placeholder="" autocomplete="off"></textarea>
  <button id="send-btn">发送</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('msg-input');
const btnEl = document.getElementById('send-btn');

// 用户标识：localStorage 持久化，支持 ?uid= 覆盖
function getUid() {
  const q = new URLSearchParams(location.search).get('uid');
  if (q) { localStorage.setItem('mindmate_uid', q); return q; }
  let uid = localStorage.getItem('mindmate_uid');
  if (!uid) {
    uid = 'u_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('mindmate_uid', uid);
  }
  return uid;
}
const UID = getUid();

let lastMsgTime = null;

function formatTime(isoStr) {
  const d = new Date(isoStr);
  if (isNaN(d.getTime())) return '';
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return '刚刚';
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dayDiff = Math.round((today - msgDay) / 86400000);
  if (dayDiff === 0) return hh + ':' + mm;
  if (dayDiff === 1) return '昨天 ' + hh + ':' + mm;
  if (d.getFullYear() === now.getFullYear()) {
    return (d.getMonth() + 1) + '月' + d.getDate() + '日 ' + hh + ':' + mm;
  }
  return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日 ' + hh + ':' + mm;
}

function addTimestamp(isoStr) {
  const el = document.createElement('div');
  el.className = 'timestamp';
  el.textContent = formatTime(isoStr);
  chatEl.appendChild(el);
}

function addMsg(text, role, createdAt) {
  // 时间分隔线：gap ≥ 5 分钟时插入
  if (createdAt) {
    const t = new Date(createdAt).getTime();
    if (!isNaN(t)) {
      if (!lastMsgTime || t - lastMsgTime >= 5 * 60 * 1000) {
        addTimestamp(createdAt);
      }
      lastMsgTime = t;
    }
  }
  const row = document.createElement('div');
  row.className = `row ${role}`;
  const avatar = document.createElement('div');
  avatar.className = role === 'user' ? 'avatar me' : 'avatar';
  avatar.textContent = role === 'user' ? '我' : '🌿';
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(wrap);
  chatEl.appendChild(row);
  scrollBottom();
}

function addSys(text) {
  const el = document.createElement('div');
  el.className = 'sys';
  el.textContent = text;
  chatEl.appendChild(el);
  scrollBottom();
}

function showTyping() {
  if (document.getElementById('typing-indicator')) return;
  const row = document.createElement('div');
  row.className = 'row assistant';
  row.id = 'typing-indicator';
  row.innerHTML = `<div class="avatar">🌿</div>
    <div class="bubble-wrap"><div class="bubble typing-bubble">
      <span></span><span></span><span></span></div></div>`;
  chatEl.appendChild(row);
  scrollBottom();
}
function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function scrollBottom() { chatEl.scrollTop = chatEl.scrollHeight; }

// 载入历史对话
async function loadHistory() {
  try {
    const d = await (await fetch(`/api/dashboard/history?session_key=${encodeURIComponent(UID)}&limit=60`)).json();
    chatEl.innerHTML = '';
    lastMsgTime = null;
    (d.history || []).forEach(h => addMsg(h.content, h.role === 'assistant' ? 'assistant' : 'user', h.created_at));
    if (!d.history || !d.history.length) addSys('和小暖聊聊吧');
  } catch (e) { /* ignore */ }
}

// 连接 WebSocket（带 uid 标识用户）
let ws = null;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws?uid=${encodeURIComponent(UID)}`);
  ws.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch { data = { type: 'message', content: e.data }; }
    if (data.type === 'typing') {
      showTyping();
    } else if (data.type === 'message') {
      hideTyping();
      if (data.content) addMsg(data.content, 'assistant', new Date().toISOString());
      btnEl.disabled = false;
    }
  };
  ws.onclose = () => { setTimeout(connect, 3000); };
}

function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  addMsg(text, 'user', new Date().toISOString());
  inputEl.value = '';
  autoGrow();
  btnEl.disabled = true;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(text);
  } else {
    addSys('连接断开，正在重连…');
    btnEl.disabled = false;
  }
}

function autoGrow() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
}

btnEl.addEventListener('click', send);
inputEl.addEventListener('input', autoGrow);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

loadHistory();
connect();
</script>
</body>
</html>
