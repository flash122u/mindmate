<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMate · 医生后台</title>
<style>
  :root {
    --wx-green: #07c160;
    --bg: #ededed;
    --card: #ffffff;
    --text: #181818;
    --sub: #888;
    --line: #eaeaea;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px;
  }

  /* 顶栏 */
  header {
    background: var(--wx-green); color: #fff;
    padding: 14px 20px; display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 10;
  }
  header .logo { font-size: 16px; font-weight: 600; }
  header a { color: rgba(255,255,255,.85); text-decoration: none; font-size: 13px; }
  header a:hover { color: #fff; }
  header .spacer { flex: 1; }
  header select {
    border: none; border-radius: 14px; padding: 5px 12px; font-size: 13px;
    background: rgba(255,255,255,.2); color: #fff; outline: none; cursor: pointer;
  }
  header select option { color: #333; }
  header .refresh { cursor: pointer; font-size: 16px; opacity: .9; }
  header .refresh:hover { opacity: 1; }

  .container { max-width: 960px; margin: 16px auto; padding: 0 14px; }

  /* 概览卡片 */
  .overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .stat-item {
    background: var(--card); border-radius: 12px; padding: 18px 14px; text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .stat-item .num { font-size: 26px; font-weight: 600; color: var(--wx-green); line-height: 1.1; }
  .stat-item .num.warn { color: #fa8c16; }
  .stat-item .num.danger { color: #f5222d; }
  .stat-item .label { font-size: 12px; color: var(--sub); margin-top: 6px; }

  .card { background: var(--card); border-radius: 12px; padding: 18px 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .card h2 { font-size: 15px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .card h2 .bar { width: 3px; height: 14px; background: var(--wx-green); border-radius: 2px; }

  #trend { width: 100%; height: 160px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); color: var(--sub); font-weight: 500; }
  td { padding: 9px 10px; border-bottom: 1px solid #f5f5f5; vertical-align: top; line-height: 1.5; }
  tr:last-child td { border-bottom: none; }

  .badge { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge.low { background: #fff7e6; color: #d46b08; }
  .badge.medium { background: #fff1e6; color: #d4380d; }
  .badge.high { background: #fff1f0; color: #cf1322; }
  .empty { color: #c8c8c8; text-align: center; padding: 18px; }

  .who { display: inline-block; padding: 1px 8px; border-radius: 4px; font-size: 12px; }
  .who.assistant { background: #e7f9ee; color: var(--wx-green); }
  .who.user { background: #f0f0f0; color: #666; }
</style>
</head>
<body>
<header>
  <span class="logo">🌿 MindMate</span>
  <a href="/chat">← 返回聊天</a>
  <span class="spacer"></span>
  <span style="font-size:13px;opacity:.85">患者</span>
  <select id="user-select" onchange="onUserChange()"></select>
  <span class="refresh" onclick="loadAll()" title="刷新">↻</span>
</header>

<div class="container">
  <div class="overview" id="overview">
    <div class="empty" style="grid-column:1/-1">加载中…</div>
  </div>

  <div class="card">
    <h2><span class="bar"></span>上下文管理</h2>
    <div class="overview" id="context-stats">
      <div class="empty" style="grid-column:1/-1">加载中…</div>
    </div>
  </div>

  <div class="card">
    <h2><span class="bar"></span>情绪趋势</h2>
    <svg id="trend" viewBox="0 0 900 160" preserveAspectRatio="none"></svg>
    <div id="trend-empty" class="empty" style="display:none">暂无情绪数据</div>
  </div>

  <div class="card">
    <h2><span class="bar"></span>⚠️ 风险预警</h2>
    <table>
      <thead><tr><th style="width:70px">等级</th><th style="width:140px">时间</th><th>触发内容</th></tr></thead>
      <tbody id="alerts"><tr><td colspan="3" class="empty">加载中…</td></tr></tbody>
    </table>
  </div>

  <div class="card">
    <h2><span class="bar"></span>对话回放</h2>
    <table>
      <thead><tr><th style="width:60px">角色</th><th style="width:140px">时间</th><th>内容</th></tr></thead>
      <tbody id="history"><tr><td colspan="3" class="empty">加载中…</td></tr></tbody>
    </table>
  </div>

  <div class="card">
    <h2><span class="bar"></span>Agent 运行轨迹
      <span style="font-size:12px;color:var(--sub);cursor:pointer;font-weight:400" id="traces-toggle" onclick="toggleTraces()">▸ 展开</span>
    </h2>
    <div id="traces-section" style="display:none">
      <div id="traces-content" class="empty">加载中…</div>
    </div>
  </div>
</div>

<script>
const fmt = (iso) => iso ? iso.replace('T', ' ').slice(0, 16) : '';

let currentUser = 'default';
const q = (extra) => `?session_key=${encodeURIComponent(currentUser)}${extra || ''}`;

async function loadUsers() {
  const d = await (await fetch('/api/dashboard/users')).json();
  const sel = document.getElementById('user-select');
  const users = d.users && d.users.length ? d.users : ['default'];
  if (!users.includes(currentUser)) currentUser = users[0];
  sel.innerHTML = users.map(u => `<option value="${u}" ${u===currentUser?'selected':''}>${u}</option>`).join('');
}

function onUserChange() {
  currentUser = document.getElementById('user-select').value;
  loadAll();
}

async function loadOverview() {
  const d = await (await fetch('/api/dashboard/overview' + q())).json();
  const cls = d.high_alert_count > 0 ? 'danger' : (d.alert_count > 0 ? 'warn' : '');
  const rd = d.route_distribution || {};
  document.getElementById('overview').innerHTML = `
    <div class="stat-item"><div class="num">${d.turn_count}</div><div class="label">对话条数</div></div>
    <div class="stat-item"><div class="num">${d.stage}</div><div class="label">关系阶段</div></div>
    <div class="stat-item"><div class="num">${d.avg_valence}</div><div class="label">平均情绪 (-1~1)</div></div>
    <div class="stat-item"><div class="num">${d.anchor_count}</div><div class="label">情绪锚点</div></div>
    <div class="stat-item"><div class="num ${cls}">${d.alert_count}</div><div class="label">风险预警 (高危 ${d.high_alert_count})</div></div>
    <div class="stat-item"><div class="num" style="font-size:18px">💬${rd.chat||0} ⚠${rd.risk||0} 🔧${rd.functional||0} 🪪${rd.identity||0}</div><div class="label">路由分布 (聊/危/功/身)</div></div>
  `;
}

async function loadTrends() {
  const d = await (await fetch('/api/dashboard/trends' + q())).json();
  const pts = d.points || [];
  const svg = document.getElementById('trend');
  const emptyEl = document.getElementById('trend-empty');
  if (pts.length < 2) { svg.style.display='none'; emptyEl.style.display='block'; return; }
  svg.style.display='block'; emptyEl.style.display='none';
  const W = 900, H = 160, pad = 14;
  const n = pts.length;
  const x = (i) => pad + (W - 2*pad) * i / (n - 1);
  const y = (v) => H/2 - v * (H/2 - pad);
  let path = '';
  pts.forEach((p, i) => { path += (i ? 'L' : 'M') + x(i).toFixed(1) + ',' + y(p.valence).toFixed(1) + ' '; });
  let area = path + `L${x(n-1).toFixed(1)},${H/2} L${x(0).toFixed(1)},${H/2} Z`;
  const dots = pts.map((p, i) => {
    const color = p.valence >= 0 ? '#07c160' : '#f5a623';
    return `<circle cx="${x(i).toFixed(1)}" cy="${y(p.valence).toFixed(1)}" r="3.5" fill="${color}"><title>${p.emotion}: ${p.valence}</title></circle>`;
  }).join('');
  svg.innerHTML = `
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07c160" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#07c160" stop-opacity="0"/>
    </linearGradient></defs>
    <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="#eee" stroke-width="1"/>
    <path d="${area}" fill="url(#g)"/>
    <path d="${path}" fill="none" stroke="#07c160" stroke-width="2"/>
    ${dots}`;
}

async function loadAlerts() {
  const d = await (await fetch('/api/dashboard/alerts' + q())).json();
  const tb = document.getElementById('alerts');
  if (!d.alerts.length) { tb.innerHTML = '<tr><td colspan="3" class="empty">暂无预警，一切平稳</td></tr>'; return; }
  tb.innerHTML = d.alerts.map(a => `
    <tr><td><span class="badge ${a.level}">${a.level}</span></td>
    <td>${fmt(a.created_at)}</td><td>${a.message}</td></tr>`).join('');
}

async function loadHistory() {
  const d = await (await fetch('/api/dashboard/history' + q('&limit=60'))).json();
  const tb = document.getElementById('history');
  if (!d.history.length) { tb.innerHTML = '<tr><td colspan="3" class="empty">暂无对话</td></tr>'; return; }
  tb.innerHTML = d.history.map(h => {
    const who = h.role === 'assistant' ? '小暖' : '用户';
    const cls = h.role === 'assistant' ? 'assistant' : 'user';
    return `<tr><td><span class="who ${cls}">${who}</span></td><td>${fmt(h.created_at)}</td><td>${h.content}</td></tr>`;
  }).join('');
}

async function loadTraces() {
  try {
    const d = await (await fetch('/api/dashboard/traces' + q('&limit=10'))).json();
    const el = document.getElementById('traces-content');
    if (!d.traces || !d.traces.length) {
      el.innerHTML = '<div class="empty">暂无运行轨迹（发送一条消息后出现）</div>'; return;
    }
    el.innerHTML = d.traces.map(t => {
      const stepsHtml = (t.steps || []).map(s => {
        const color = s.status === 'error' ? '#f5222d' : s.status === 'skipped' ? '#bbb' : '#333';
        const icon = s.status === 'error' ? '✕' : s.status === 'skipped' ? '○' : '✓';
        return `<div style="font-size:12px;padding:2px 0;color:${color};display:flex;gap:8px">
          <span style="min-width:20px;text-align:right">${icon}</span>
          <span style="min-width:130px">${s.step_name}</span>
          <span style="min-width:45px;color:var(--sub)">${s.elapsed_ms}ms</span>
          <span style="color:var(--sub)">${s.detail}</span>
        </div>`;
      }).join('');
      return `<div style="margin-bottom:10px;padding:10px 12px;background:#fafafa;border-radius:8px">
        <div style="font-size:12px;color:var(--sub);margin-bottom:6px;display:flex;justify-content:space-between">
          <span>${fmt(t.started_at)}</span>
          <span>总耗时 <b>${t.total_elapsed_ms}ms</b></span>
        </div>
        ${stepsHtml}
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

function toggleTraces() {
  const el = document.getElementById('traces-section');
  const btn = document.getElementById('traces-toggle');
  if (el.style.display === 'none') {
    el.style.display = 'block'; btn.textContent = '▾ 收起';
  } else {
    el.style.display = 'none'; btn.textContent = '▸ 展开';
  }
}

async function loadContextStats() {
  try {
    const d = await (await fetch('/api/dashboard/context-stats' + q())).json();
    document.getElementById('context-stats').innerHTML = `
      <div class="stat-item"><div class="num">${d.window_size}</div><div class="label">窗口轮数</div></div>
      <div class="stat-item"><div class="num">${d.total_history_rows}</div><div class="label">历史总条数</div></div>
      <div class="stat-item"><div class="num">${d.compression_ratio}x</div><div class="label">压缩比</div></div>
      <div class="stat-item"><div class="num">${d.system_prompt_chars_approx}</div><div class="label">System Prompt (chars)</div></div>
      <div class="stat-item"><div class="num">${d.anchor_recall_count}</div><div class="label">本轮召回锚点</div></div>
      <div class="stat-item"><div class="num">${d.anchor_store_count}</div><div class="label">存储锚点总数</div></div>
      <div class="stat-item"><div class="num">${d.memory_md_chars}</div><div class="label">MEMORY.md (chars)</div></div>
    `;
  } catch(e) { console.error(e); }
}

async function loadAll() {
  try {
    await loadUsers();
    await Promise.all([loadOverview(), loadTrends(), loadAlerts(), loadHistory(), loadTraces(), loadContextStats()]);
  } catch (e) { console.error(e); }
}
loadAll();
setInterval(loadAll, 15000);
</script>
</body>
</html>
