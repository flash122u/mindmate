<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>MindMate — 医生管理后台</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; }
  nav { background: #fff; padding: 12px 24px; border-bottom: 1px solid #e0e0e0; display: flex; gap: 24px; }
  nav a { text-decoration: none; color: #666; font-size: 14px; padding: 8px 0; border-bottom: 2px solid transparent; }
  nav a.active { color: #07c160; border-bottom-color: #07c160; }
  .container { max-width: 960px; margin: 24px auto; padding: 0 16px; }
  .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .card h2 { font-size: 16px; margin-bottom: 12px; color: #333; }
  .stat { display: flex; gap: 32px; }
  .stat-item { text-align: center; }
  .stat-item .num { font-size: 28px; font-weight: 600; color: #07c160; }
  .stat-item .label { font-size: 12px; color: #999; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #eee; color: #999; font-weight: 500; }
  td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; color: #555; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .badge.warn { background: #fff3e0; color: #e65100; }
  .badge.ok { background: #e8f5e9; color: #2e7d32; }
  .badge.high { background: #ffebee; color: #c62828; }
</style>
</head>
<body>
<nav>
  <a href="/" class="active">概览</a>
  <a href="/chat">聊天</a>
  <a href="#" onclick="alert('待实现')">情绪趋势</a>
  <a href="#" onclick="alert('待实现')">对话记录</a>
</nav>

<div class="container">
  <div class="card">
    <h2>概览</h2>
    <div class="stat">
      <div class="stat-item"><div class="num">—</div><div class="label">今日对话</div></div>
      <div class="stat-item"><div class="num">—</div><div class="label">平均情绪</div></div>
      <div class="stat-item"><div class="num">0</div><div class="label">风险预警</div></div>
      <div class="stat-item"><div class="num">—</div><div class="label">关系阶段</div></div>
    </div>
  </div>

  <div class="card">
    <h2>最近对话</h2>
    <table>
      <thead><tr><th>时间</th><th>内容摘要</th><th>情绪</th></tr></thead>
      <tbody>
        <tr><td colspan="3" style="color:#ccc;text-align:center;">暂无数据</td></tr>
      </tbody>
    </table>
  </div>

  <div class="card">
    <h2>风险预警</h2>
    <table>
      <thead><tr><th>等级</th><th>时间</th><th>内容</th></tr></thead>
      <tbody>
        <tr><td colspan="3" style="color:#ccc;text-align:center;">暂无预警</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
